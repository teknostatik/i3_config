# -------------------------------------------------------
# Hyprland configuration
# Mirror of i3/Sway layout with Hyprland-native syntax
# -------------------------------------------------------

$mod = ALT
$terminal = kitty
$menu = wofi --show drun
$lock = /usr/local/bin/hypr-lock-blur

# --- Monitor ---
# Defaults to the preferred resolution/refresh at position (0,0) scale 1.
# Uncomment and adjust if you need specific monitor settings.
monitor = ,preferred,auto,1

# --- Startup ---
exec-once = dbus-update-activation-environment --systemd DISPLAY WAYLAND_DISPLAY HYPRLAND_INSTANCE_SIGNATURE XDG_CURRENT_DESKTOP=Hyprland
exec-once = /usr/local/bin/waybar-launch-hypr
exec-once = hyprpaper
exec-once = hypridle
exec-once = nm-applet
exec-once = blueman-applet
exec-once = copyq
exec-once = caffeine-indicator
exec-once = dropbox start -i
exec-once = mako
exec-once = /usr/lib/policykit-1-gnome/polkit-gnome-authentication-agent-1

# --- General ---
general {
    layout = dwindle
    border_size = 2
    gaps_in = 4
    gaps_out = 8
    col.active_border = rgba(6272A4ff)
    col.inactive_border = rgba(44475Aff)
}

# --- Decoration ---
decoration {
    rounding = 5
    blur {
        enabled = true
        size = 3
        passes = 1
    }
    drop_shadow = false
}

# --- Animations ---
animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 5, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# --- Layout ---
dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

# --- Input ---
# Change kb_layout to match your keyboard (e.g. gb, de, fr)
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
}

# --- Misc ---
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}

# -------------------------------------------------------
# Keybindings
# -------------------------------------------------------

# Core
bind = $mod, Return, exec, $terminal
bind = $mod SHIFT, Q, killactive
bind = $mod, D, exec, $menu

# Focus — same hjkl/arrow mapping as i3
bind = $mod, J, movefocus, l
bind = $mod, K, movefocus, d
bind = $mod, L, movefocus, u
bind = $mod, semicolon, movefocus, r
bind = $mod, left, movefocus, l
bind = $mod, down, movefocus, d
bind = $mod, up, movefocus, u
bind = $mod, right, movefocus, r

# Move windows
bind = $mod SHIFT, J, movewindow, l
bind = $mod SHIFT, K, movewindow, d
bind = $mod SHIFT, L, movewindow, u
bind = $mod SHIFT, semicolon, movewindow, r
bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, down, movewindow, d
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, right, movewindow, r

# Move current workspace to adjacent monitor
bind = $mod CTRL, left, movecurrentworkspacetomonitor, l
bind = $mod CTRL, right, movecurrentworkspacetomonitor, r

# Layout orientation (closest Hyprland equivalents of i3's h/v/e/s/w)
bind = $mod, H, layoutmsg, orientationleft
bind = $mod, V, layoutmsg, orientationbottom
bind = $mod, E, layoutmsg, togglesplit
bind = $mod, S, layoutmsg, orientationlast
bind = $mod, W, layoutmsg, orientationtop

# Fullscreen / floating
bind = $mod, F, fullscreen
bind = $mod SHIFT, space, togglefloating
bind = $mod, space, focusurgentorlast
bind = $mod, A, layoutmsg, focusmaster

# Config reload / exit
bind = $mod SHIFT, C, exec, hyprctl reload
bind = $mod SHIFT, R, exec, hyprctl reload

# --- Workspaces 1–10 (Alt+number) ---
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# --- Workspaces 11–20 (Alt+Super+number) ---
bind = $mod SUPER, 1, workspace, 11
bind = $mod SUPER, 2, workspace, 12
bind = $mod SUPER, 3, workspace, 13
bind = $mod SUPER, 4, workspace, 14
bind = $mod SUPER, 5, workspace, 15
bind = $mod SUPER, 6, workspace, 16
bind = $mod SUPER, 7, workspace, 17
bind = $mod SUPER, 8, workspace, 18
bind = $mod SUPER, 9, workspace, 19
bind = $mod SUPER, 0, workspace, 20

bind = $mod SUPER SHIFT, 1, movetoworkspace, 11
bind = $mod SUPER SHIFT, 2, movetoworkspace, 12
bind = $mod SUPER SHIFT, 3, movetoworkspace, 13
bind = $mod SUPER SHIFT, 4, movetoworkspace, 14
bind = $mod SUPER SHIFT, 5, movetoworkspace, 15
bind = $mod SUPER SHIFT, 6, movetoworkspace, 16
bind = $mod SUPER SHIFT, 7, movetoworkspace, 17
bind = $mod SUPER SHIFT, 8, movetoworkspace, 18
bind = $mod SUPER SHIFT, 9, movetoworkspace, 19
bind = $mod SUPER SHIFT, 0, movetoworkspace, 20

# --- Resize submap (Alt+R to enter, Escape/Enter/$mod+R to leave) ---
bind = $mod, R, submap, resize
submap = resize
binde = , J, resizeactive, -10 0
binde = , K, resizeactive, 0 10
binde = , L, resizeactive, 0 -10
binde = , semicolon, resizeactive, 10 0
binde = , left, resizeactive, -10 0
binde = , down, resizeactive, 0 10
binde = , up, resizeactive, 0 -10
binde = , right, resizeactive, 10 0
bind = , Return, submap, reset
bind = , Escape, submap, reset
bind = $mod, R, submap, reset
submap = reset

# --- System submap (Alt+Backspace) ---
bind = $mod, BackSpace, submap, system
submap = system
bind = , L, exec, $lock
bind = , L, submap, reset
bind = , E, exec, hyprctl dispatch exit
bind = , E, submap, reset
bind = , S, exec, $lock && systemctl suspend
bind = , S, submap, reset
bind = , H, exec, $lock && systemctl hibernate
bind = , H, submap, reset
bind = , R, exec, systemctl reboot
bind = , R, submap, reset
bind = CTRL, S, exec, systemctl poweroff -i
bind = CTRL, S, submap, reset
bind = , Return, submap, reset
bind = , Escape, submap, reset
submap = reset

# Lock screen (Super+L matches the i3/Sway convention)
bind = SUPER, L, exec, $lock

# Screenshot
bind = , Print, exec, /usr/local/bin/hypr-screenshot-region

# Wallpaper rotation (Alt+Z)
bind = $mod, Z, exec, /usr/local/bin/randomise_wallpaper_hypr

# Volume / brightness
binde = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +10%
binde = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -10%
bind = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bind = , XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle
binde = , XF86MonBrightnessUp, exec, brightnessctl set +10%
binde = , XF86MonBrightnessDown, exec, brightnessctl set 10%-

# Mouse drag for floating windows
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# -------------------------------------------------------
# Window rules
# -------------------------------------------------------
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(wdisplays)$
windowrulev2 = float, class:^(Gimp)$
windowrulev2 = float, class:^(zoom)$
windowrulev2 = float, title:^(Microsoft Teams Notification)$
windowrulev2 = float, title:^(About Mozilla Firefox)$
