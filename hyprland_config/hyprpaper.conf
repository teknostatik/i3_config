# hyprpaper.conf
# The install script replaces __DEFAULT_WALLPAPER__ with the first image
# found in /usr/share/wallpaper. After that, use Alt+Z or the
# randomise_wallpaper_hypr script to cycle wallpapers at runtime.

ipc = on
splash = false

preload = __DEFAULT_WALLPAPER__
wallpaper = ,__DEFAULT_WALLPAPER__
