# hypridle.conf
# Screen lock and DPMS idle management for Hyprland

general {
    lock_cmd = pidof swaylock || /usr/local/bin/hypr-lock-blur
    before_sleep_cmd = /usr/local/bin/hypr-lock-blur
    after_sleep_cmd = hyprctl dispatch dpms on
}

# Lock after 15 minutes idle
listener {
    timeout = 900
    on-timeout = /usr/local/bin/hypr-lock-blur
}

# Screen off after 20 minutes idle
listener {
    timeout = 1200
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}
