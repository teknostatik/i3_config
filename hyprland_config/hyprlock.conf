# hyprlock.conf
# Screen-lock appearance for hyprlock
# Used as an alternative to the blur-lock script when hyprlock is preferred.

background {
    monitor =
    color = rgba(282a36ff)
    blur_passes = 2
    blur_size = 7
    brightness = 0.6
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.33
    dots_spacing = 0.15
    outer_color = rgba(6272a4ff)
    inner_color = rgba(44475aff)
    font_color = rgba(f8f8f2ff)
    fade_on_empty = false
    placeholder_text = Password
    hide_input = false
    position = 0, -100
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(f8f8f2ff)
    font_size = 64
    font_family = monospace
    position = 0, 100
    halign = center
    valign = center
}
